name: Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Build platform
        required: true
        default: macos
        type: choice
        options:
          - all
          - windows
          - macos
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-publish:
    name: Build and publish (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: Windows x64
            platform: windows
            os: windows-latest
            install: npm ci --no-fund --no-audit
            command: npm run publish
          - name: macOS arm64
            platform: macos
            os: macos-latest
            install: npm ci --ignore-scripts --no-fund --no-audit
            command: npm run publish:mac

    steps:
      - name: Skip unselected platform
        if: >-
          github.event_name == 'workflow_dispatch' &&
          github.event.inputs.platform != 'all' &&
          github.event.inputs.platform != matrix.platform
        run: echo "Skipping ${{ matrix.platform }} build"

      - name: Checkout
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.platform
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.platform
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python for node-gyp
        if: >-
          matrix.platform == 'macos' &&
          (github.event_name != 'workflow_dispatch' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.platform)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Python for node-gyp
        if: >-
          matrix.platform == 'macos' &&
          (github.event_name != 'workflow_dispatch' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.platform)
        run: |
          python -m pip install --upgrade setuptools
          python -c "from distutils.version import StrictVersion; print('distutils ok')"
          echo "PYTHON=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"
          echo "npm_config_python=$(python -c 'import sys; print(sys.executable)')" >> "$GITHUB_ENV"

      - name: Install dependencies
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.platform
        run: ${{ matrix.install }}

      - name: Build and publish
        if: >-
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.platform == 'all' ||
          github.event.inputs.platform == matrix.platform
        run: ${{ matrix.command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=4096
